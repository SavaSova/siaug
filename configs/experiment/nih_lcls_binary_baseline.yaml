# @package _global_

defaults:
  - override /dataloader: nih_binary_holdout.yaml
  - override /model: lincls.yaml
  - override /criterion: bce_binary_pos_weight.yaml
  - override /metrics: binary.yaml

task_name: lcls_nih_binary_baseline
max_epoch: 20

dataloader:
  train:
    batch_size: 24
    dataset:
      com_transform:
        _target_: siaug.augmentations.ExtractKeys
        keys: ["img", "lbl"]
      img_transform:
        _target_: torchvision.transforms.Compose
        transforms:
          - _target_: torchvision.transforms.RandomResizedCrop
            size: 224
          - _target_: torchvision.transforms.RandomHorizontalFlip
          - _target_: torchvision.transforms.ToTensor
          - _target_: torchvision.transforms.Normalize
            mean: [0.50551915, 0.50551915, 0.50551915]
            std: [0.2895694, 0.2895694, 0.2895694]

  valid:
    batch_size: 24
    dataset:
      com_transform:
        _target_: siaug.augmentations.ExtractKeys
        keys: ["img", "lbl"]
      img_transform:
        _target_: torchvision.transforms.Compose
        transforms:
          - _target_: torchvision.transforms.Resize
            size: [256, 256]
          - _target_: torchvision.transforms.CenterCrop
            size: 224
          - _target_: torchvision.transforms.ToTensor
          - _target_: torchvision.transforms.Normalize
            mean: [0.50551915, 0.50551915, 0.50551915]
            std: [0.2895694, 0.2895694, 0.2895694]

model:
  backbone: resnet50
  num_channels: 3
  num_classes: 1
  freeze: false
  ckpt_path: null

optimizer:
  lr: 0.1
  weight_decay: 0.0001
  momentum: 0.9
