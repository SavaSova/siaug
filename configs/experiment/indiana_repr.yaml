# @package _global_

defaults:
  - override /dataloader: indiana.yaml

task_name: repr_indiana_baseline
tags: ["${model.backbone}", "repr", "indiana"]
max_epoch: 20
ckpt_every_n_epochs: 2

dataloader:
  train:
    batch_size: 16
    dataset:
      com_transform:
        _target_: siaug.augmentations.ExtractKeys
        keys: ["img"]
      img_transform:
        _target_: siaug.augmentations.ToSiamese
        t1:
          _target_: torchvision.transforms.Compose
          transforms:
            - _target_: torchvision.transforms.RandomResizedCrop
              size: 192
              scale: [0.3, 0.9]
            - _target_: torchvision.transforms.ColorJitter
              brightness: 0.5
              contrast: 0.5
              saturation: 0.0
              hue: 0.0
            - _target_: torchvision.transforms.ToTensor
            - _target_: torchvision.transforms.Normalize
              mean: [0.50551915, 0.50551915, 0.50551915]
              std: [0.2895694, 0.2895694, 0.2895694]
        t2:
          _target_: torchvision.transforms.Compose
          transforms:
            - _target_: torchvision.transforms.RandomResizedCrop
              size: 192
              scale: [0.3, 0.9]
            - _target_: torchvision.transforms.ColorJitter
              brightness: 0.5
              contrast: 0.5
              saturation: 0.0
              hue: 0.0
            - _target_: torchvision.transforms.ToTensor
            - _target_: torchvision.transforms.Normalize
              mean: [0.50551915, 0.50551915, 0.50551915]
              std: [0.2895694, 0.2895694, 0.2895694]
  valid: null

model:
  backbone: resnet50
  num_channels: 3
